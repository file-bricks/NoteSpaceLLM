<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060814" />
      <stop offset="40%" stop-color="#0b112c" />
      <stop offset="80%" stop-color="#1a0b2e" />
      <stop offset="100%" stop-color="#080312" />
    </linearGradient>

    <!-- Nebula Gradients -->
    <radialGradient id="nebulaCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.25" />
      <stop offset="60%" stop-color="#00f2fe" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebulaMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f355ff" stop-opacity="0.2" />
      <stop offset="60%" stop-color="#f355ff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#f355ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebulaOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7b00" stop-opacity="0.15" />
      <stop offset="70%" stop-color="#ff7b00" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#ff7b00" stop-opacity="0" />
    </radialGradient>

    <!-- Note Gradients -->
    <linearGradient id="yellowNote" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF59D" />
      <stop offset="100%" stop-color="#FBC02D" />
    </linearGradient>
    <linearGradient id="cyanNote" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA" />
      <stop offset="100%" stop-color="#00ACC1" />
    </linearGradient>
    <linearGradient id="magentaNote" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC" />
      <stop offset="100%" stop-color="#D81B60" />
    </linearGradient>
    <linearGradient id="purpleNote" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6" />
      <stop offset="100%" stop-color="#3F51B5" />
    </linearGradient>

    <!-- Logo Text Gradients -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#E0F7FA" />
      <stop offset="100%" stop-color="#80DEEA" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#a154ff" />
      <stop offset="100%" stop-color="#ff3b00" />
    </linearGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="4" dy="10" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <filter id="deepShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="8" dy="16" stdDeviation="10" flood-color="#000000" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- BACKGROUND (fills the full canvas) -->
  <rect width="1200" height="340" fill="url(#bgGradient)" />

  <!-- Nebula / Cosmic Dust -->
  <circle cx="250" cy="170" r="250" fill="url(#nebulaCyan)" />
  <circle cx="950" cy="150" r="300" fill="url(#nebulaMagenta)" />
  <circle cx="600" cy="200" r="200" fill="url(#nebulaOrange)" />

  <!-- Constellations & Grid Lines (Background space details) -->
  <g opacity="0.12" stroke="#ffffff" stroke-width="1">
    <line x1="100" y1="100" x2="250" y2="70" />
    <line x1="250" y1="70" x2="350" y2="120" />
    <line x1="350" y1="120" x2="300" y2="250" stroke-dasharray="3,3" />
    <line x1="300" y1="250" x2="150" y2="220" />
    <line x1="150" y1="220" x2="100" y2="100" />
    <line x1="250" y1="70" x2="200" y2="170" />
    <line x1="300" y1="250" x2="200" y2="170" stroke-dasharray="5,5" />
    
    <circle cx="100" cy="100" r="2" fill="#fff" />
    <circle cx="250" cy="70" r="3" fill="#fff" />
    <circle cx="350" cy="120" r="2" fill="#fff" />
    <circle cx="300" cy="250" r="3" fill="#fff" />
    <circle cx="150" cy="220" r="2" fill="#fff" />
    <circle cx="200" cy="170" r="2.5" fill="#fff" />
  </g>

  <!-- Background stars -->
  <g fill="#ffffff">
    <circle cx="70" cy="80" r="1" opacity="0.3"/>
    <circle cx="120" cy="280" r="1.5" opacity="0.6"/>
    <circle cx="220" cy="50" r="0.8" opacity="0.4"/>
    <circle cx="380" cy="300" r="1.2" opacity="0.5"/>
    <circle cx="450" cy="90" r="1" opacity="0.3"/>
    <circle cx="500" cy="270" r="1.8" opacity="0.7" fill="#80DEEA"/>
    <circle cx="620" cy="60" r="1.2" opacity="0.5"/>
    <circle cx="710" cy="280" r="1" opacity="0.4"/>
    <circle cx="830" cy="80" r="1.5" opacity="0.8" fill="#FFF59D"/>
    <circle cx="920" cy="290" r="0.8" opacity="0.3"/>
    <circle cx="1020" cy="110" r="1" opacity="0.5"/>
    <circle cx="1110" cy="250" r="1.6" opacity="0.6"/>
    <circle cx="1150" cy="70" r="1" opacity="0.4"/>
  </g>

  <!-- Glowing Cross Stars -->
  <path d="M 280 40 Q 280 45 285 45 Q 280 45 280 50 Q 280 45 275 45 Q 280 45 280 40 Z" fill="#ffffff" opacity="0.8" filter="url(#softGlow)" />
  <path d="M 980 250 Q 980 255 985 255 Q 980 255 980 260 Q 980 255 975 255 Q 980 255 980 250 Z" fill="#80DEEA" opacity="0.9" filter="url(#softGlow)" />
  <path d="M 680 100 Q 680 103 683 103 Q 680 103 680 106 Q 680 103 677 103 Q 680 103 680 100 Z" fill="#ffffff" opacity="0.7" />

  <!-- ==================== FOREGROUND SAFE ZONE ELEMENTS ==================== -->
  <!-- Safe zone: x:80..1120 y:60..300. Everything below stays strictly inside these boundaries. -->
  <g id="foreground">

    <!-- Orbit Rings around the notes -->
    <path d="M 100 190 Q 240 100 380 170" fill="none" stroke="url(#highlightGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6" stroke-dasharray="8 6" filter="url(#softGlow)" />
    <path d="M 380 170 Q 240 260 100 190" fill="none" stroke="url(#highlightGradient)" stroke-width="2" stroke-linecap="round" opacity="0.3" stroke-dasharray="3 3" />

    <!-- Orbiting particles -->
    <circle cx="210" cy="140" r="4" fill="#00f2fe" filter="url(#softGlow)" />
    <circle cx="340" cy="180" r="3" fill="#ff7b00" opacity="0.8" />
    <circle cx="130" cy="180" r="5" fill="#a154ff" filter="url(#softGlow)" />

    <!-- FLOATING NOTES / DOCUMENTS (Left Side) -->
    
    <!-- Note 1: Magenta / Pink Note -->
    <g transform="translate(170, 220) rotate(-25)">
      <rect x="-45" y="-45" width="90" height="90" rx="6" fill="#000" opacity="0.35" transform="translate(4, 8) scale(0.98)" />
      <rect x="-45" y="-45" width="90" height="90" rx="6" fill="url(#magentaNote)" filter="url(#deepShadow)" />
      <path d="M -45 -30 L 45 -30 L 45 -45 Q 45 -45 40 -45 L -40 -45 Q -45 -45 -45 -45 Z" fill="#C2185B" opacity="0.3" />
      <line x1="-30" y1="-15" x2="20" y2="-15" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7" />
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7" />
      <line x1="-30" y1="15" x2="5" y2="15" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7" />
      <circle cx="25" cy="23" r="4" fill="#ffffff" filter="url(#softGlow)" />
    </g>

    <!-- Note 2: Pastel Yellow Note -->
    <g transform="translate(200, 128) rotate(12)">
      <rect x="-45" y="-45" width="90" height="90" rx="4" fill="#000" opacity="0.3" transform="translate(5, 7) scale(0.98)" />
      <rect x="-45" y="-45" width="90" height="90" rx="4" fill="url(#yellowNote)" filter="url(#deepShadow)" />
      <path d="M 30 45 L 45 30 L 35 30 Q 30 30 30 35 Z" fill="#F57F17" opacity="0.4" />
      <path d="M 30 45 L 45 45 L 45 30 Z" fill="#0b112c" />
      <path d="M 30 45 L 45 30 L 30 30 Z" fill="#FFE082" />

      <line x1="-30" y1="-25" x2="25" y2="-25" stroke="#5D4037" stroke-width="3" stroke-linecap="round" opacity="0.4" />
      <line x1="-30" y1="-10" x2="15" y2="-10" stroke="#5D4037" stroke-width="3" stroke-linecap="round" opacity="0.4" />
      <line x1="-30" y1="5" x2="30" y2="5" stroke="#5D4037" stroke-width="3" stroke-linecap="round" opacity="0.4" />
      <line x1="-30" y1="20" x2="-5" y2="20" stroke="#5D4037" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    </g>

    <!-- Note 3: Cyan/Blue Note -->
    <g transform="translate(310, 175) rotate(-15)">
      <rect x="-50" y="-50" width="100" height="100" rx="6" fill="#000" opacity="0.3" transform="translate(6, 10) scale(0.98)" />
      <rect x="-50" y="-50" width="100" height="100" rx="6" fill="url(#cyanNote)" filter="url(#deepShadow)" />
      <g stroke="#ffffff" stroke-width="2" opacity="0.8">
        <line x1="-20" y1="0" x2="0" y2="-25" />
        <line x1="-20" y1="0" x2="15" y2="-15" />
        <line x1="0" y1="-25" x2="25" y2="0" />
        <line x1="15" y1="-15" x2="25" y2="0" />
        <line x1="-20" y1="0" x2="0" y2="25" />
        <line x1="0" y1="25" x2="25" y2="0" />
        <line x1="15" y1="15" x2="25" y2="0" stroke-dasharray="2 2" />
        <line x1="-20" y1="0" x2="15" y2="15" />

        <circle cx="-20" cy="0" r="5.5" fill="#ffffff" stroke="#00838F" stroke-width="1.5" />
        <circle cx="0" cy="-25" r="4.5" fill="#E0F7FA" stroke="#00838F" stroke-width="1.5" />
        <circle cx="25" cy="0" r="6.5" fill="#00E5FF" stroke="#ffffff" stroke-width="1.5" filter="url(#softGlow)" />
        <circle cx="0" cy="25" r="4.5" fill="#E0F7FA" stroke="#00838F" stroke-width="1.5" />
        <circle cx="15" cy="-15" r="3.5" fill="#ffffff" />
        <circle cx="15" cy="15" r="3.5" fill="#ffffff" />
      </g>
    </g>

    <!-- Mini Note 4 -->
    <g transform="translate(125, 140) rotate(-40) scale(0.6)">
      <rect x="-40" y="-40" width="80" height="80" rx="3" fill="#ffffff" opacity="0.25" filter="url(#dropShadow)" />
      <line x1="-25" y1="-20" x2="15" y2="-20" stroke="#fff" stroke-width="3" opacity="0.6" />
      <line x1="-25" y1="-5" x2="25" y2="-5" stroke="#fff" stroke-width="3" opacity="0.6" />
      <line x1="-25" y1="10" x2="5" y2="10" stroke="#fff" stroke-width="3" opacity="0.6" />
    </g>

    <!-- Mini Note 5 -->
    <g transform="translate(360, 240) rotate(35) scale(0.65)">
      <rect x="-40" y="-40" width="80" height="80" rx="4" fill="url(#purpleNote)" opacity="0.8" filter="url(#dropShadow)" />
      <circle cx="0" cy="0" r="15" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="3 2" />
      <path d="M -8 -8 L 8 8 M 8 -8 L -8 8" stroke="#ffffff" stroke-width="2.5" />
    </g>

    <!-- Center digital brain/document symbol -->
    <g transform="translate(255, 165) scale(0.85)" filter="url(#softGlow)">
      <circle cx="0" cy="0" r="28" fill="#060814" stroke="#00f2fe" stroke-width="2" opacity="0.9" />
      <path d="M -10 -14 L 4 -14 L 12 -6 L 12 14 Q 12 16 10 16 L -10 16 Q -12 16 -12 14 L -12 -12 Q -12 -14 -10 -14 Z" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linejoin="round" />
      <path d="M 4 -14 L 4 -8 L 12 -8" fill="none" stroke="#00f2fe" stroke-width="2" />
      <line x1="-7" y1="-4" x2="7" y2="-4" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" />
      <line x1="-7" y1="2" x2="7" y2="2" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" />
      <line x1="-7" y1="8" x2="1" y2="8" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" />
      <circle cx="16" cy="-14" r="3" fill="#ffffff" filter="url(#softGlow)" />
    </g>

    <!-- WORDMARK & TAGLINE (Right Side) -->
    <g transform="translate(510, 0)">
      <text x="0" y="175" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="76" letter-spacing="-1.5" fill="url(#textGradient)" filter="url(#softGlow)">
        NoteSpace<tspan fill="url(#highlightGradient)" font-weight="900">LLM</tspan>
      </text>

      <text x="5" y="222" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="25" letter-spacing="4" fill="#a0aec0" opacity="0.95">
        LOCAL AI FOR YOUR DOCUMENTS
      </text>

      <g transform="translate(5, 250)" opacity="0.85">
        <!-- Feature 1: Privacy -->
        <g transform="translate(0, 0)">
          <rect x="0" y="5" width="16" height="12" rx="2" fill="none" stroke="#00f2fe" stroke-width="1.5" />
          <path d="M 3 5 L 3 3 Q 3 0 8 0 Q 13 0 13 3 L 13 5" fill="none" stroke="#00f2fe" stroke-width="1.5" />
          <text x="24" y="15" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="13" letter-spacing="1" fill="#e2e8f0">100% PRIVATE</text>
        </g>

        <circle cx="160" cy="11" r="2.5" fill="#a154ff" opacity="0.7" />

        <!-- Feature 2: Offline/Local -->
        <g transform="translate(190, 0)">
          <circle cx="8" cy="11" r="8" fill="none" stroke="#a154ff" stroke-width="1.5" />
          <line x1="0" y1="11" x2="16" y2="11" stroke="#a154ff" stroke-width="1.2" />
          <path d="M 8 3 Q 12 11 8 19 Q 4 11 8 3 Z" fill="none" stroke="#a154ff" stroke-width="1.2" />
          <text x="24" y="15" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="13" letter-spacing="1" fill="#e2e8f0">RUNS LOCALLY</text>
        </g>

        <circle cx="340" cy="11" r="2.5" fill="#ff7b00" opacity="0.7" />

        <!-- Feature 3: Fast -->
        <g transform="translate(370, 0)">
          <path d="M 8 0 L 0 10 L 6 10 L 4 18 L 14 7 L 8 7 Z" fill="#ff7b00" filter="url(#softGlow)" />
          <text x="22" y="15" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="13" letter-spacing="1" fill="#e2e8f0">ZERO-LAG AI</text>
        </g>
      </g>
    </g>

  </g>
  <!-- ==================== END FOREGROUND ==================== -->

</svg>
